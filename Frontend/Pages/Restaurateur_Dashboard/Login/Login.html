<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointeResto - Connexion Pro</title>
    <link rel="stylesheet" href="../../Assets/Css/Thème.css">
    <link rel="stylesheet" href="../Login/Login_style.css">
</head>
<body>
    <div class="mobile-container login-layout">
        <div class="login-card">
            <h2>Espace Gestion</h2>
            <p class="subtitle">Veuillez saisir vos accès pour piloter votre établissement.</p>
            
            <form id="form-connexion">
                <div class="form-group">
                    <label for="input-email">Adresse Email</label>
                    <input type="email" id="input-email" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="input-password">Mot de passe</label>
                    <input type="password" id="input-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-submit">Se connecter</button>
            </form>
            <p id="error-message" class="error-box" style="display: none;"></p>
        </div>
    </div>
    <script src="../Dashboard/Dashboard_logic.js"></script>
</body>
</html>
