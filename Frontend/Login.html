<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointeResto - Connexion</title>
    <link rel="stylesheet" href="Assets/CSS/Variable.css">
    <link rel="stylesheet" href="Assets/CSS/Layout.css">
    <link rel="stylesheet" href="Assets/CSS/Composantes.css">
    <link rel="stylesheet" href="Assets/CSS/Form.css">
</head>
<body>
    <header class="header-banner header-dashboard">
        <h1 class="header-title">PointeResto</h1>
        <p class="header-subtitle">Authentification obligatoire</p>
    </header>
    <main>
        <section class="form-review">
            <h2 class="resto-title">Se connecter</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email :</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Mot de passe :</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-submit">S'authentifier</button>
            </form>
        </section>
    </main>
    <script src="Assets/JS/api.js"></script>
    <script src="Assets/JS/Auth.js"></script>
    <script src="Assets/JS/app.js"></script>
</body>
</html>
