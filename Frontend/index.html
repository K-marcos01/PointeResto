<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PointeResto - Découvrez Pointe-Noire</title>
    <link rel="stylesheet" href="../Frontend/CSS/Global.css">
    <link rel="stylesheet" href="../Frontend/CSS/Composantes.css">
</head>
<body>

    <!-- Barre de navigation haute -->
    <header class="main-header">
        <h1>PointeResto</h1>
    </header>

    <!-- Zone des filtres de recherche -->
    <main class="mobile-container">
        <section class="search-box">
            <h2>Trouver une table à Pointe-Noire</h2>
            
            <input type="text" id="search-input" placeholder="Ex: poisson braisé, hamburger...">
            
            <!-- Cette liste sera remplie dynamiquement par l'API -->
            <select id="workspace-select">
                <option value="">Tous les quartiers</option>
            </select>
        </section>

        <!-- Zone d'affichage dynamique des cartes restaurants -->
        <section id="restaurants-container" class="restaurants-list">
            <p class="loading-text">Chargement des établissements locaux...</p>
        </section>
    </main>

    <!-- Chargement de nos scripts JavaScript modulaires -->
    <script src="../Frontend/JS/api.js"></script>
    <script src="../Frontend/JS/dom.js"></script>
    <script src="../Frontend/JS/app.js"></script>
    <script src="../Frontend/JS/filters.js"></script>
</body>
</html>
